<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>Page Translator Options</title>
    <script type="module" src="options.js"></script>
  </head>
  <body>
    <header>
      <h1>Page Translator Options</h1>
    </header>

    <main>
      <form id="options-form">
        <fieldset>
          <legend>Translation Defaults</legend>

          <p>
            <label for="source-lang">Source Language:</label>
            <select id="source-lang" name="sourceLang"></select>
          </p>

          <p>
            <label for="target-lang">Target Language:</label>
            <select id="target-lang" name="targetLang"></select>
          </p>
        </fieldset>

        <!-- Accessible status container for success/error messages (e.g., "Options saved.") -->
        <div id="status" role="status" aria-live="polite"></div>
      </form>
    </main>
  </body>
</html>
